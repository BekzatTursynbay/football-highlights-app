<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Match Highlight</title>

    <style>
      body {
        margin: 0;
        background: #754040;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100dvh;
        overflow: hidden;
      }

      .video-wrapper {
        position: relative;
        width: 100vw;
        max-width: 1000px;
        aspect-ratio: 16 / 9;
        background: black;
        overflow: hidden;
      }

      @media (orientation: landscape) and (max-width: 1024px) {
        .video-wrapper {
          width: calc(100dvh * 16 / 9);
          max-width: 100vw;
        }
      }

      #player {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      /* ===== BLUR ===== */
      .blur-overlay {
        position: absolute;
        z-index: 10;
        pointer-events: none;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        opacity: 0;
        transition: opacity 0.25s ease;
      }

      .blur-overlay.visible {
        opacity: 1;
      }

      .blur-overlay-top {
        top: 0;
        left: 0;
        width: 70%;
        height: 20%;
      }

      .blur-overlay-bottom {
        bottom: 0;
        right: 0;
        width: 40%;
        height: 40%;
      }

      @media (max-width: 600px) {
        .blur-overlay-top {
          height: 15%;
        }
      }

      /* ===== CONTROLS ===== */
      .controls {
        position: absolute;
        bottom: 0;
        width: 100%;
        z-index: 30;
        display: flex;
        gap: 10px;
        padding: 10px;
        align-items: center;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
      }

      .controls button {
        border: none;
        padding: 6px 10px;
        cursor: pointer;
      }

      .controls input[type="range"] {
        flex: 1;
      }
    </style>
  </head>

  <body>
    <div class="video-wrapper" id="videoWrapper">
      <!-- Blur -->
      <div class="blur-overlay blur-overlay-top" id="blurOverlayTop"></div>
      <div
        class="blur-overlay blur-overlay-bottom"
        id="blurOverlayBottom"
      ></div>

      <!-- Player -->
      <div id="player"></div>

      <!-- Custom Controls -->
      <div class="controls">
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
        <input id="volumeRange" type="range" min="0" max="100" value="50" />
      </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="watch.js"></script>
  </body>
</html>
