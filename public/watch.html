<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Match Highlight</title>
    <style>
      body {
        margin: 0;
        background: #754040;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }

      .video-wrapper {
        position: relative;
        width: 80vw;
        max-width: 1000px;
        aspect-ratio: 16 / 9;
        background: black;
        overflow: hidden;
      }

      /* Cropped iframe */
      iframe {
        position: absolute;
        /* top: -50px; */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="video-wrapper">
      <div id="player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="watch.js"></script>
  </body>
</html>
