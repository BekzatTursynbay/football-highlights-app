<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Match Highlight</title>
    <style>
      body {
        margin: 0;
        background: #754040;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100dvh;
        overflow: hidden;
      }

      .video-wrapper {
        position: relative;
        width: 100vw;
        max-width: 1000px;
        aspect-ratio: 16 / 9;
        background: black;
        overflow: hidden;
      }

      /* Landscape: constrain by height so video fits without scrolling */
      @media (orientation: landscape) and (max-width: 1024px) {
        .video-wrapper {
          width: calc(100dvh * 16 / 9);
          max-width: 100vw;
        }
      }

      /* Cropped iframe */
      iframe {
        position: absolute;
        /* top: -50px; */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
      }

      /* Shared blur styles */
      .blur-overlay {
        position: absolute;
        z-index: 10;
        pointer-events: all;
        -webkit-user-select: none;
        user-select: none;
        background: rgba(0, 0, 0, 0.45);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .blur-overlay.visible {
        opacity: 1;
      }

      /* Top-left overlay */
      .blur-overlay-top {
        top: 0;
        left: 0;
        width: 70%;
        height: 20%;
      }

      /* Bottom-right overlay */
      .blur-overlay-bottom {
        bottom: 0;
        right: 0;
        width: 40%;
        height: 40%;
      }

      @media (max-width: 600px) {
        .blur-overlay-top {
          height: 15%;
        }
      }
    </style>
  </head>
  <body>
    <div class="video-wrapper" id="videoWrapper">
      <div class="blur-overlay blur-overlay-top" id="blurOverlayTop"></div>
      <div
        class="blur-overlay blur-overlay-bottom"
        id="blurOverlayBottom"
      ></div>
      <div id="player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="watch.js"></script>
  </body>
</html>
