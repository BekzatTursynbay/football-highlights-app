<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Match Highlight</title>
    <style>
      body {
        margin: 0;
        background: #754040;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }

      .video-wrapper {
        position: relative;
        width: 80vw;
        max-width: 1000px;
        aspect-ratio: 16 / 9;
        background: black;
        overflow: hidden;
      }

      /* Cropped iframe */
      iframe {
        position: absolute;
        /* top: -50px; */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
      }

      /* Blur overlay: top-left 50% width */
      .blur-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 50%;
        height: 20%;
        z-index: 10;
        pointer-events: none;
        background: rgba(0, 0, 0, 0.45);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .blur-overlay.visible {
        opacity: 1;
      }

      @media (max-width: 600px) {
        .blur-overlay {
          height: 15%;
        }
      }
    </style>
  </head>
  <body>
    <div class="video-wrapper" id="videoWrapper">
      <div class="blur-overlay" id="blurOverlay"></div>
      <div id="player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="watch.js"></script>
  </body>
</html>
